.cat {
  width: 100%;
  height: 0;
  padding-top: 100%;
  border: 3px solid var(--line);
  border-radius: 24px;
  background: #fff;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}

  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
  display: block;
}

.cat-placeholder {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: grid;
  place-items: center;
  background: repeating-linear-gradient(
    -45deg,
    #fff,
    #fff 8px,
    #f0f0f0 8px,
    #f0f0f0 16px
  );
  font-size: 16px;
}
    .title { font-size:24px; text-align:center; font-weight:700; min-height:68px; }
    .opts { display:flex; flex-direction:column; gap:10px; }
    button { border:3px solid #111; border-radius:999px; background:#fff; padding:11px 14px; font-size:16px; cursor:pointer; }
    /* 无效选项仍然可以点击触发弹窗，但视觉上不做灰化处理，保持与普通按钮一致 */
    button.invalid { opacity:1; color:#111; border-color:#111; background:#fff; }
    .toolbar { margin-top:auto; display:flex; gap:8px; }
    .toolbar button { flex:1; font-size:14px; }
    .debug { background:#fff; border:3px solid #111; border-radius:18px; padding:12px; white-space:pre-wrap; }
    .mask {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, .35);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 26px;
  z-index: 10;
}

.modal {
  width: min(320px, 86%);

  border: 3px solid #111;
  border-radius: 24px;
  background: #fff;
  padding: 14px 14px 16px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  justify-content: center;
  overflow: hidden;

.modal.success {

}

.modal h3 {
  margin: 4px 0 2px;
  font-size: 18px;
}

.modal p {
  margin: 4px 0;
  font-size: 15px;
  line-height: 1.5;
}

.share-tip {
  margin: 2px 0 6px;
  font-size: 15px;
  line-height: 1.5;
}

.modal button {
  padding: 8px 18px;
  font-size: 14px;
  border-width: 3px;
}

.icon {
  width: 46px;
  height: 46px;
  border: 2px dashed #111;
  border-radius: 12px;
  display: grid;
  place-items: center;
}

.modal-image {
  width: 100%;
  max-height: 150px;
  object-fit: contain;
  border-radius: 16px;
  display: block;
}

function imageCandidates(relPath) {
  if (!relPath) return [];
  return [
    `../design/${relPath}`,
    `../UI%20design/${relPath}`,
    `../UI design/${relPath}`
  ];
}

function candidatesFor(nodeId, map) {
  return imageCandidates(map[nodeId]);
}

function escapeAttr(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function handleImgError(img) {
  let fallbacks = [];
  try {
    fallbacks = JSON.parse(img.dataset.fallbacks || '[]');
  } catch (e) {
    fallbacks = [];
  }

  if (fallbacks.length) {
    img.src = fallbacks.shift();
    img.dataset.fallbacks = JSON.stringify(fallbacks);
    return;
  }

  if (img.classList.contains('modal-image')) {
    img.style.display = 'none';
    return;
  }

  img.parentNode.innerHTML = '<div class="cat-placeholder">🐱 小毛咪占位图</div>';
}

function imageTemplate(nodeId, altText) {
  const candidates = candidatesFor(nodeId, nodeImages);

  if (!candidates.length) {
    return `<div class="cat"><div class="cat-placeholder">🐱 小毛咪占位图</div></div>`;
  }

  return `
    <div class="cat">
      <img
        src="${escapeAttr(candidates[0])}"
        data-fallbacks="${escapeAttr(JSON.stringify(candidates.slice(1)))}"
        alt="${escapeAttr(altText || '小毛咪插画')}"
        onerror="handleImgError(this)"
      />
    </div>
  `;
}

  const candidates = activeModal.imageCandidates || [];
  if (!candidates.length) return '';

  return `
    <img
      class="modal-image"
      src="${escapeAttr(candidates[0])}"
      data-fallbacks="${escapeAttr(JSON.stringify(candidates.slice(1)))}"
      alt="弹窗插画"
      onerror="handleImgError(this)"
    />
  `;
}

let currentNodeId='SCENE_001', navStack=[], activeModal=null, lastFeedbackType='none', pendingSound='';

const childrenOf=id=>nodes.filter(n=>n.parentId===id && n.nodeType!=='RESULT_MODAL');
const goTo=id=>{
  if(!byId[id]) return;
  navStack.push(currentNodeId);
  currentNodeId=id;
  activeModal=null;
  if(byId[id].nodeType!=='AUDIO_OPTION') pendingSound='';
  render();
};
const back=()=>{
  if(navStack.length){
    currentNodeId=navStack.pop();
    activeModal=null;
    if(byId[currentNodeId].nodeType!=='AUDIO_OPTION') pendingSound='';
    render();
  }
};
const goHome=()=>{
  currentNodeId='SCENE_001';
  navStack=[];
  activeModal=null;
  pendingSound='';
  render();
};

function openResultModal(resultNode){
  const fb=(resultNode.triggerFeedback||{}).type;
  const common = {
    nodeId: resultNode.id,
    text: resultNode.text,
    imageCandidates: candidatesFor(resultNode.id, modalImages)
  };

  if(fb==='success') activeModal={
    ...common,
    type:'success',
    icon:resultNode.triggerFeedback.icon
  };
  else if(fb==='touch') activeModal={
    ...common,
    type:'touch',
    sound:resultNode.triggerFeedback.sound
  };
  else activeModal={
    ...common,
    type:'feedback'
  };

  lastFeedbackType='result_modal';
}

function onTap(node){
  if(node.nodeType==='OPTION_INVALID'){
    const feedback = node.triggerFeedback || {};
    const hasText = Object.prototype.hasOwnProperty.call(feedback, 'text');
    const hasButton = Object.prototype.hasOwnProperty.call(feedback, 'button');

    activeModal = {
      type: 'invalid',
      title: feedback.title || '可恶！',
      text: hasText ? feedback.text : '哎呀！被亲亲了！',
      button: hasButton ? feedback.button : '重选一次吧',
      nodeId: node.id,
      imageCandidates: candidatesFor(node.id, modalImages)
    };

    lastFeedbackType = 'invalid';
    return render();
  }
  if(node.nodeType==='AUDIO_OPTION'){
    pendingSound=node.triggerFeedback.sound||'声音素材';
    lastFeedbackType='audio';
    // AUDIO_OPTION 自身就是“播放声音后的结果选择页”，点击后进入该节点以展示其子选项
    if(currentNodeId!==node.id) return goTo(node.id);
    return render();
  }
  if(node.nextId==='END' || node.nextId==='END_SUCCESS_SHARE'){
    lastFeedbackType='end';
    return render();
  }
  const next=byId[node.nextId];
  if(next && next.nodeType==='RESULT_MODAL'){
    openResultModal(next);
    return render();
  }
  if(node.nextId) return goTo(node.nextId);
}

function closeModal(){ activeModal=null; render(); }
function playSound(){ if(pendingSound) alert('正在播放：'+pendingSound); else alert('正在播放：声音素材'); }
function share(){ alert('分享海报功能待接入'); }

function modalTemplate(){
  if(!activeModal) return '';
  const imageHtml = modalImageTemplate(activeModal);
  if(activeModal.type==='invalid') {
  const textHtml = activeModal.text ? `<p>${activeModal.text}</p>` : '';
  return `<div class="mask"><div class="modal">${imageHtml}<h3>${activeModal.title}</h3>${textHtml}<button onclick="closeModal()">${activeModal.button}</button></div></div>`;
}
  if(activeModal.type==='success') {
    const iconHtml = activeModal.icon ? `<div class="icon">${activeModal.icon}</div>` : '';
    return `<div class="mask"><div class="modal success">${imageHtml}${iconHtml}<h3>${activeModal.text}</h3><p class="share-tip">截图分享给姐姐</p><button onclick="closeModal()">关闭</button></div></div>`;
  }
  if(activeModal.type==='touch') return `<div class="mask"><div class="modal">${imageHtml}<p>${activeModal.text}</p><button onclick="closeModal()">关闭</button></div></div>`;
  return `<div class="mask"><div class="modal">${imageHtml}<p>${activeModal.text}</p><button onclick="closeModal()">关闭</button></div></div>`;
}

function render(){
  const node=byId[currentNodeId];
  const options=childrenOf(currentNodeId);
  const html=`
    ${imageTemplate(currentNodeId, node.text)}
    <div class="title">${node.text}</div>
    ${pendingSound?`<div style="font-size:13px;text-align:center;">音频占位：正在播放：${pendingSound}</div>`:''}
    <div class="opts">${options.map(o=>`<button data-id="${o.id}" class="${o.nodeType==='OPTION_INVALID'?'invalid':''}">${o.text}</button>`).join('')}</div>
    <div class="toolbar"><button id="back">返回上一步</button><button id="home">回到首页</button></div>
    ${modalTemplate()}
  `;
  const app=document.getElementById('app');
  app.innerHTML=html;
  app.querySelectorAll('button[data-id]').forEach(b=>b.onclick=()=>onTap(byId[b.dataset.id]));
  document.getElementById('back').onclick=back;
  document.getElementById('home').onclick=goHome;
  document.getElementById('debug').textContent=`currentNodeId: ${currentNodeId}\nparentId: ${node.parentId}\nnodeType: ${node.nodeType}\nnavStack: ${JSON.stringify(navStack)}\nlastFeedbackType: ${lastFeedbackType}`;
}
render();
</script>
</body>
</html>
